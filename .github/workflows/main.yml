name: Build Deb Package
on: workflow_dispatch # Allows you to run it with a click
jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Package
        run: |
          mkdir -p build/DEBIAN build/usr/local/bin
          # Create your metadata file
          cat <<EOF > build/DEBIAN/control
          Package: my-chrome-app
          Version: 1.0.0
          Architecture: all
          Maintainer: WebUser <web@example.com>
          Description: Compiled on a Chromebook without Linux.
          EOF
          # Move your app file from the repo to the build folder
          cp my_script.sh build/usr/local/bin/
          # Build the package
          dpkg-deb --build build my-app.deb
      - name: Save Result
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: my-app.deb
